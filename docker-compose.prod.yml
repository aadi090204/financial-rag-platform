services:

  backend:
    image: adithya09/finance-rag-advisor-backend:latest
    pull_policy: always
    container_name: rag-backend

    expose:
      - "8000"

    env_file:
      - .env

    volumes:
      - /opt/finance-rag/data/chroma_db:/app/chroma_db
      - /opt/finance-rag/data/uploads:/app/uploads

    restart: unless-stopped

    networks:
      - finance-network

  frontend:
    image: adithya09/finance-rag-advisor-frontend:latest
    pull_policy: always
    container_name: rag-frontend

    expose:
      - "80"

    depends_on:
      - backend

    restart: unless-stopped

    networks:
      - finance-network

  nginx:
    image: nginx:alpine
    container_name: rag-nginx

    ports:
      - "80:80"

    volumes:
      - /opt/finance-rag/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/finance-rag/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - frontend
      - backend

    restart: unless-stopped

    networks:
      - finance-network

  prometheus:
    image: prom/prometheus:latest
    container_name: rag-prometheus

    ports:
      - "9090:9090"

    volumes:
      - /opt/finance-rag/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    restart: unless-stopped

    networks:
      - finance-network

  grafana:
    image: grafana/grafana:latest
    container_name: rag-grafana

    ports:
      - "3001:3000"

    restart: unless-stopped

    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge
