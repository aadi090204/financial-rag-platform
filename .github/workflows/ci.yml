name: Finance RAG CI/CD

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

concurrency:
  group: finance-rag-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  BACKEND_IMAGE: adithya09/finance-rag-advisor-backend
  FRONTEND_IMAGE: adithya09/finance-rag-advisor-frontend

jobs:

  validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Compose File
        run: docker compose config

  integration-test:
    name: Build & Integration Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build and Start Containers
        run: docker compose up -d --build

      - name: Wait for Backend Health
        run: |
          echo "Waiting for backend..."

          for i in {1..30}; do
            if curl -fs http://localhost:8000/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi

            sleep 5
          done

          echo "Backend failed to start."

          docker compose logs backend

          exit 1

      - name: Verify Backend
        run: |
          curl -f http://localhost:8000/health

      - name: Verify Frontend
        run: |
          curl -I http://localhost:3000

      - name: Show Running Containers
        if: always()
        run: docker ps

      - name: Show Backend Logs
        if: failure()
        run: docker compose logs backend

      - name: Show Frontend Logs
        if: failure()
        run: docker compose logs frontend

      - name: Stop Containers
        if: always()
        run: docker compose down -v

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: integration-test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ####################################################
      # Backend Image
      ####################################################

      - name: Backend Metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ####################################################
      # Frontend Image
      ####################################################

      - name: Frontend Metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: publish-images

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Application
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/finance-rag

            echo "Pulling latest Docker images..."
            docker compose -f docker-compose.prod.yml pull

            echo "Starting updated containers..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for backend to become healthy..."

            for i in {1..30}; do
              if curl -fs http://localhost:8000/health >/dev/null; then
                echo "Backend is healthy."
                curl http://localhost:8000/health

                echo "Running containers:"
                docker ps

                echo "Deployment completed successfully."
                exit 0
              fi

              echo "Attempt $i/30 - backend not ready yet..."
              sleep 5
            done

            echo "Backend failed to become healthy."

            docker ps
            docker logs rag-backend --tail=100

            exit 1
